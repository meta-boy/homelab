apiVersion: v1
kind: Service
metadata:
  name: {{ include "adguard.fullname" . }}-dns
  labels:
    {{- include "adguard.labels" . | nindent 4 }}
    service-type: dns
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if and (eq .Values.service.type "LoadBalancer") .Values.service.dnsLoadBalancerIP }}
  loadBalancerIP: {{ .Values.service.dnsLoadBalancerIP }}
  {{- end }}
  ports:
    - port: {{ .Values.service.dns.port }}
      targetPort: dns-udp
      protocol: {{ .Values.service.dns.protocol }}
      name: dns-udp
    - port: {{ .Values.service.dns.port }}
      targetPort: dns-tcp
      protocol: TCP
      name: dns-tcp
  selector:
    {{- include "adguard.selectorLabels" . | nindent 4 }}
---
# Web Interface Service (HTTP)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adguard.fullname" . }}-web
  labels:
    {{- include "adguard.labels" . | nindent 4 }}
    service-type: web
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if and (eq .Values.service.type "LoadBalancer") .Values.service.webLoadBalancerIP }}
  loadBalancerIP: {{ .Values.service.webLoadBalancerIP }}
  {{- end }}
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: web
      protocol: TCP
      name: web
  selector:
    {{- include "adguard.selectorLabels" . | nindent 4 }}