---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: registry-auth
  namespace: docker-registry
spec:
  encryptedData:
    # PLACEHOLDER: Replace with your actual sealed secret data
    # To create htpasswd credentials:
    # 1. Generate htpasswd file using OpenSSL: echo "username:$(openssl passwd -6 'password')" > htpasswd
    # 2. Create a secret: kubectl create secret generic registry-auth --from-file=htpasswd=./htpasswd --dry-run=client -o yaml
    # 3. Seal the secret: kubeseal --format=yaml < secret.yaml > sealed-secret.yaml
    #
    # OR simply run: ./setup-auth.sh (automated script)
    htpasswd: 
  template:
    metadata:
      name: registry-auth
      namespace: docker-registry
    type: Opaque
