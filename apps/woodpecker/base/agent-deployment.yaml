apiVersion: apps/v1
kind: Deployment
metadata:
  name: woodpecker-agent
  namespace: woodpecker
  labels:
    app: woodpecker-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: woodpecker-agent
  template:
    metadata:
      labels:
        app: woodpecker-agent
    spec:
      serviceAccountName: woodpecker-agent
      containers:
        - name: woodpecker-agent
          image: woodpeckerci/woodpecker-agent:latest
          env:
            - name: WOODPECKER_SERVER
              value: "woodpecker-server:9000"
            - name: WOODPECKER_AGENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: woodpecker-secret
                  key: agent-secret
            # FIX: Added to allow the agent to launch privileged steps (for DinD/docker.sock)
            - name: WOODPECKER_ENABLE_PRIVILEGED
              value: "true"
            - name: WOODPECKER_BACKEND
              value: "kubernetes"
            - name: WOODPECKER_BACKEND_K8S_NAMESPACE
              value: "woodpecker"
            - name: WOODPECKER_BACKEND_K8S_STORAGE_CLASS
              value: ""
            - name: WOODPECKER_BACKEND_K8S_VOLUME_SIZE
              value: "10G"
            - name: WOODPECKER_BACKEND_K8S_STORAGE_RWX
              value: "false"
            # FIX: Configure pipeline pods to work with insecure registries
            - name: WOODPECKER_BACKEND_K8S_SECCTX_NONROOT
              value: "false"
            # Set default resources for pipeline pods (buildah needs more memory)
            - name: WOODPECKER_BACKEND_K8S_POD_RESOURCES_LIMITS_MEMORY
              value: "2Gi"
            - name: WOODPECKER_BACKEND_K8S_POD_RESOURCES_LIMITS_CPU
              value: "2000m"
            - name: WOODPECKER_BACKEND_K8S_POD_RESOURCES_REQUESTS_MEMORY
              value: "1Gi"
            - name: WOODPECKER_BACKEND_K8S_POD_RESOURCES_REQUESTS_CPU
              value: "500m"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
