# This is a template file for creating secrets
# DO NOT commit actual secrets to git!
#
# To create a sealed secret:
# 1. Fill in the values below
# 2. Run: kubeseal --controller-name=sealed-secrets-controller --controller-namespace=kube-system --format=yaml < sealed-secret.yaml > sealed-secret-encrypted.yaml
# 3. Commit only the sealed-secret-encrypted.yaml file
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: woodpecker-secret
#   namespace: woodpecker
# type: Opaque
# stringData:
#   # Generate a random agent secret with: openssl rand -hex 32
#   agent-secret: "YOUR_AGENT_SECRET"
#
#   # Optional: Set admin username (GitHub/Gitea username)
#   admin-user: ""
#
#   # GitHub OAuth Application credentials
#   # Create at: https://github.com/settings/developers
#   # Authorization callback URL: https://woodpecker.is-up-in.space/authorize
#   github-client: "YOUR_GITHUB_CLIENT_ID"
#   github-secret: "YOUR_GITHUB_CLIENT_SECRET"
#
#   # Alternative: Gitea OAuth Application credentials (uncomment to use)
#   # gitea-url: "https://gitea.example.com"
#   # gitea-client: "YOUR_GITEA_CLIENT_ID"
#   # gitea-secret: "YOUR_GITEA_CLIENT_SECRET"
