apiVersion: v1
kind: Secret
metadata:
  name: woodpecker-secret
  namespace: woodpecker
type: Opaque
stringData:
  # Generate a random agent secret with: openssl rand -hex 32
  agent-secret: "REPLACE_WITH_AGENT_SECRET"

  # Optional: Set admin username (GitHub/Gitea username)
  admin-user: ""

  # GitHub OAuth Application credentials
  # Create at: https://github.com/settings/developers
  # Authorization callback URL: https://woodpecker.is-up-in.space/authorize
  github-client: "REPLACE_WITH_GITHUB_CLIENT_ID"
  github-secret: "REPLACE_WITH_GITHUB_CLIENT_SECRET"

  # Alternative: Gitea OAuth Application credentials (uncomment to use)
  # gitea-url: "https://gitea.example.com"
  # gitea-client: "REPLACE_WITH_GITEA_CLIENT_ID"
  # gitea-secret: "REPLACE_WITH_GITEA_CLIENT_SECRET"
